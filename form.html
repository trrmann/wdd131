<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD131 - Form - Tracy R. Mann</title>
    <meta name="description" content="WDD131 - Form - Tracy R. Mann - assignment for week 5.">
    <meta name="author" content="Tracy R. Mann">
    <link href="https://fonts.googleapis.com/css2?family=Eagle+Lake&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" type="text/css" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
</head>
<body>
    <header>
        <div>
            <h1>Product Review</h1>
        </div>
        <div class="line"></div>
    </header>
    <main>
        <form method="get" action="review.html" class="product-rev-web-form">
            <fieldset>
                <legend>Product Information</legend>
                <label>Product Name*
                    <select id="product-name" name="productname" required>
                        <option value="">Choose a Product ... &#9662;</option>
                    </select>
                </label>
                <div>Overall Rating*</div>
                <label><input type="radio" id="rating-1" name="rating" value="1" required>&star;</label>
                <label><input type="radio" id="rating-2" name="rating" value="2" required>&star;&star;</label>
                <label><input type="radio" id="rating-3" name="rating" value="3" required>&star;&star;&star;</label>
                <label><input type="radio" id="rating-4" name="rating" value="4" required>&star;&star;&star;&star;</label>
                <label><input type="radio" id="rating-5" name="rating" value="5" required>&star;&star;&star;&star;&star;</label>
                <label>Date of Installation* <input type="date" id="installDate" name="installDate" required></label>
                <div>Which features did you find useful in the product?<span>(Check all that apply)</span></div>
                <label><input type="checkbox" id="durability" name="durability" value="yes">Durability</label>
                <label><input type="checkbox" id="ease" name="ease" value="yes">Ease of Use</label>
                <label><input type="checkbox" id="performance" name="performance" value="yes">Performance</label>
                <label><input type="checkbox" id="design" name="design" value="yes">Design</label>
            </fieldset>
            <fieldset>
                <legend>Additional Information</legend>
                <label>Written Review<span>(optional)</span><textarea id="review" name="review"></textarea></label>
                <label>Your Name<span>(optional)</span><input type="text" id="name" name="name"></label>
            </fieldset>
            <input type="submit" value="File My Review">
        </form>
    </main>
    <footer>
        <p><span id="copyright"></span><span id="currentyear"></span> Tracy R. Mann - South Carolina</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
